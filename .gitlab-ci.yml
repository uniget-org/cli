include:
- local: pipeline/docker.yaml
- component: $CI_SERVER_FQDN/uniget-org/components/renovate@renovate/1.0.7
  inputs:
    rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "renovate"
    - if: $CI_PIPELINE_SOURCE == "web" && $SCHEDULED_JOB == "renovate"
    token_variable_name: RENOVATE_TOKEN
    github_token_variable_name: RENOVATE_GITHUB_TOKEN

test:
  rules:
  - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_PIPELINE_SOURCE == "web" && $SCHEDULED_JOB == "test"
  trigger:
    include: pipeline/test.yaml
    strategy: depend

dev_build:
  rules:
  - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  needs:
  - test
  image: golang:1.26.0
  cache:
    paths:
      - .go/pkg/mod/
  variables:
    GOPATH: $CI_PROJECT_DIR/.go
    CGO_ENABLED: 0
  before_script: |
    mkdir -p .go
  script: |
    go build -ldflags "-w -s -X main.version=${CI_COMMIT_SHA}" ./cmd/dev/
  artifacts:
    paths:
    - dev

dev_publish:
  rules:
  - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  needs:
  - dev_build
  image: registry.gitlab.com/gitlab-org/cli:v1.85.1
  script: |
    glab auth login --hostname="${CI_SERVER_HOST}" --token="${GITLAB_TOKEN}"
    PACKAGE_NAME=dev
    PACKAGE_VERSION=${CI_COMMIT_SHA}
    FILE_NAME=dev
    glab api "/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${PACKAGE_VERSION}/${FILE_NAME}" \
        --method=PUT \
        --input=dev

release_notes:
  rules:
  - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  image: registry.gitlab.com/uniget-org/cli:noble
  variables:
    GIT_DEPTH: 0
    GLAB_SEND_TELEMETRY: 0
  before_script: |
    uniget install glab 
    glab auth login --hostname="${CI_SERVER_HOST}" --token="${BACKLOG_TOKEN}"
  script: |
    bash scripts/release-notes-gitlab.sh >release-notes.md
  artifacts:
    paths:
    - release-notes.md

release:
  rules:
  - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs:
  - test
  - release_notes
  extends:
  - .docker
  - .docker:dind
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  variables:
    GIT_DEPTH: 0
    RUNNER_GENERATE_ARTIFACTS_METADATA: "true"
  before_script: |
    if ! test -s release-notes.md; then
      echo "Release notes not found"
      exit 1
    fi
  script:
  - test -n "$CI_SERVER_HOST"
  - test -n "$CI_JOB_TOKEN"
  - test -n "$GITLAB_TOKEN"
  - test -n "$SIGSTORE_ID_TOKEN"
  - |
    docker buildx build \
        --target=publish-gitlab \
        --build-arg=CI_SERVER_HOST \
        --build-arg=CI_JOB_TOKEN \
        --build-arg=GITLAB_TOKEN \
        --build-arg=SIGSTORE_ID_TOKEN \
        .
  artifacts:
    paths:
    - "*-metadata.json"
  tags:
  - saas-linux-medium-amd64

images:
  rules:
  - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    needs:
    - release
    variables:
      PUSH: "true"
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    changes:
    - Dockerfile
    variables:
      PUSH: "false"
  - if: $CI_PIPELINE_SOURCE == "web"
    variables:
      PUSH: "true"
  - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULED_JOB == "daily_rebuild"
    variables:
      PUSH: "true"
  - if: $CI_PIPELINE_SOURCE == "web" && $SCHEDULED_JOB == "images"
  trigger:
    include: pipeline/image.yaml
    strategy: depend
